version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: transactions-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transactions}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transactions_password}
      POSTGRES_DB: ${POSTGRES_DB:-transactions_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transactions}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application
  app:
    image: transactions-platform:latest
    container_name: transactions-platform-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      PORT: 8080
      GIN_MODE: ${GIN_MODE:-release}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-transactions}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-transactions_password}
      DATABASE_NAME: ${POSTGRES_DB:-transactions_platform}
      DATABASE_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
